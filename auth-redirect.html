<!DOCTYPE html>
<html>
<head><title>Finalizando Login...</title></head>
<body>
    <script>
        // Esta página recebe o resultado da Microsoft e repassa para o Calibrador
        const hash = window.location.hash || window.location.search;
        if (hash && window.opener) {
            // Envia o hash (token/code) para a janela principal (o Calibrador)
            window.opener.postMessage({ type: "MSAL_AUTH_RESPONSE", payload: hash }, "*");
            // Fecha este popup
            window.close();
        } else {
            document.body.innerHTML = "<h1>Autenticação concluída. Pode fechar esta janela.</h1>";
        }
    </script>
</body>
</html>
